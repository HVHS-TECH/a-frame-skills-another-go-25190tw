<!DOCTYPE html>
<html lang=en>
    <head>
        <title>A-Frame scene</title>
        <script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
    </head>
    <body>
        <a-scene>
<!--
    Change the scale for each of these shapes. 
    You do not need to modify any other attribues.
    
    <hint> You might want to use these numbers: </hint>
    <hint> 0.5, 3, 5, 1000 </hint>
-->

    <a-box 
        position="-8 8 -10"
        color="yellow"
        scale="1 5 1"
    ></a-box>        

    <a-box 
        position="5 6 -5"
        color="green"
        scale="1 10 1"
    ></a-box>
    
    <a-cylinder 
        position="-3 0 -3"
        color="red"
        scale="4"
        rotation="0 180 0"
    ></a-cylinder>
    
    <a-torus 
        position="0 1.6 -4"
        color="blue"
        scale="8 4 5"
        rotation="0 45 0"
    ></a-torus>
    
        </a-scene>
    </body>
</html>
